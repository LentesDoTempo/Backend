services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=backend_secret_2026
      - DB_NAME=backend_db
      - DB_DIALECT=mysql
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=1d
      - STABILITY_API_KEY=${STABILITY_API_KEY}
      - PORT=3000
      - MAX_FILE_SIZE=5242880
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-network

  db:
    image: mysql:8.0
    container_name: backend-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=backend_secret_2026
      - MYSQL_DATABASE=backend_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

volumes:
  db_data:
  uploads:

networks:
  backend-network:
    driver: bridge
